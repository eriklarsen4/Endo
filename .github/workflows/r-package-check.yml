name: R Package Checks

on:
  push:
    branches: [dev, main]
  pull_request:

permissions: read-all

jobs:
  R-CMD-check:
    runs-on: ${{ matrix.config.os }}
    name: ${{ matrix.config.os }} (${{ matrix.config.r }})

    strategy:
      fail-fast: false
      matrix:
        config:
          - {os: ubuntu-latest,  r: 'release'}
          - {os: ubuntu-latest,  r: 'oldrel'}     # optional but stable
          - {os: macos-latest,   r: 'release'}
          - {os: windows-latest, r: 'release'}

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes

    steps:
      # Checkout package source
      - uses: actions/checkout@v4

      # Install Pandoc (needed for vignettes and markdown)
      - uses: r-lib/actions/setup-pandoc@v2

      # Install R for the selected OS/R version
      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ matrix.config.r }}
          use-public-rspm: true   # CRITICAL: fixes gdtools/ragg/cairo everywhere

      # Linux system dependencies (fixes igraph + curl)
      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libcurl4-openssl-dev \
            libglpk-dev \
            libgmp3-dev

      # Cache renv library (massive speedup)
      - name: Cache renv packages
        uses: actions/cache@v3
        with:
          path: ${{ env.RENV_PATHS_LIBRARY }}
          key: ${{ runner.os }}-renv-${{ hashFiles('**/renv.lock') }}
          restore-keys: |
            ${{ runner.os }}-renv-

      # Install package dependencies + rcmdcheck
      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          working-directory: Rpkg
          extra-packages: |
            any::rcmdcheck
          needs: check

      # Run R CMD check
      - uses: r-lib/actions/check-r-package@v2
        with:
          working-directory: Rpkg
          upload-snapshots: true
          build_args: 'c("--no-manual","--compact-vignettes=gs+qpdf")'
