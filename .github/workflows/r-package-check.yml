name: R Package Checks

on:
  push:
    branches: [dev, main]
  pull_request:

permissions: read-all

jobs:
  R-CMD-check:
    runs-on: ${{ matrix.config.os }}
    name: ${{ matrix.config.os }} (${{ matrix.config.r }})

    strategy:
      fail-fast: false
      matrix:
        config:
          - {os: macos-latest,   r: 'release'}
          - {os: windows-latest, r: 'release'}
          - {os: ubuntu-latest,  r: 'devel',   http-user-agent: 'release'}
          - {os: ubuntu-latest,  r: 'release'}
          - {os: ubuntu-latest,  r: 'oldrel-1'}

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes

    steps:
      # Checkout package source
      - uses: actions/checkout@v4

      # Install Pandoc (needed for vignettes and markdown)
      - uses: r-lib/actions/setup-pandoc@v2

      # Install R for the selected OS/R version
      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ matrix.config.r }}
          http-user-agent: ${{ matrix.config.http-user-agent }}
          use-public-rspm: true

      # Remove pak
      - name: Remove preinstalled pak
        run: Rscript -e "if ('pak' %in% rownames(installed.packages())) remove.packages('pak')"

      # Install package dependencies + rcmdcheck (required by check workflow)
      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          working-directory: Rpkg
          use-pak: false
          extra-packages: |
            any::rcmdcheck
          needs: check

      # Run R CMD check
      - uses: r-lib/actions/check-r-package@v2
        with:
          working-directory: Rpkg
          upload-snapshots: true
          build_args: 'c("--no-manual","--compact-vignettes=gs+qpdf")'
