name: R Package Checks

on:
  push:
    branches: [dev, main]
  pull_request:

permissions: read-all

jobs:
  R-CMD-check:
    runs-on: ${{ matrix.config.os }}
    name: ${{ matrix.config.os }} (${{ matrix.config.r }})

    strategy:
      fail-fast: false
      matrix:
        config:
          - {os: ubuntu-latest, r: 'release'}   # primary linux target
          - {os: macos-latest, r: 'release'}    # macos binary installs
          - {os: windows-latest, r: 'release'}  # windows binary installs

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-pandoc@v2    # required for rmd rendering

      - uses: r-lib/actions/setup-r@v2         # install r and enable rspm binaries
        with:
          r-version: ${{ matrix.config.r }}
          use-public-rspm: true

      - name: install linux system libs         # required for igraph and curl
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libcurl4-openssl-dev libglpk-dev libgmp3-dev

      - name: cache renv                        # cache renv library for speed
        uses: actions/cache@v3
        with:
          path: ${{ env.RENV_PATHS_LIBRARY }}
          key: ${{ runner.os }}-renv-${{ hashFiles('**/renv.lock') }}
          restore-keys: ${{ runner.os }}-renv-

      - name: restore renv                      # restore project environment
        working-directory: Rpkg
        run: Rscript -e "renv::restore()"

      - name: install rcmdcheck                 # install check tool outside renv
        run: Rscript -e "install.packages('rcmdcheck')"

      - name: run check                         # run r cmd check
        working-directory: Rpkg
        run: R CMD check --no-manual --as-cran .
