name: R Package Checks

on:
  push:
    branches: [dev, main]
  pull_request:

permissions: read-all

jobs:
  R-CMD-check:
    runs-on: ${{ matrix.config.os }}
    name: ${{ matrix.config.os }} (${{ matrix.config.r }})

    strategy:
      fail-fast: false
      matrix:
        config:
          - {os: ubuntu-latest, r: 'release'}   # primary linux target
          - {os: macos-latest, r: '4.4'}    # macos binary installs
          - {os: windows-latest, r: 'release'}  # windows binary installs

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: no
      R_COMPILE_AND_INSTALL_PACKAGES: never     # force binary-only installs on Windows
      RENV_CONFIG_INSTALL_STAGED: false

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-pandoc@v2    # required for rmd rendering

      - uses: r-lib/actions/setup-r@v2         # install r and enable rspm binaries
        with:
          r-version: ${{ matrix.config.r }}
          use-public-rspm: true

      - name: Install linux system libs         # required for igraph and curl
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libcurl4-openssl-dev libglpk-dev libgmp3-dev

      - name: Install macOS system libs
        if: runner.os == 'macOS'
        run: brew install pkg-config cairo pango harfbuzz freetype libpng gettext && brew link --force gettext

      - name: Disable renv staged installs (macOS)
        if: runner.os == 'macOS'
        run: echo "RENV_CONFIG_INSTALL_STAGED=false" >> $GITHUB_ENV

      - name: Set renv paths                    # required for windows cache restore
        run: echo "RENV_PATHS_LIBRARY=${{ github.workspace }}/Rpkg/renv/library" >> $GITHUB_ENV

      - name: Create renv library directory (Windows)
        if: runner.os == 'Windows'
        run: mkdir $env:GITHUB_WORKSPACE\\Rpkg\\renv\\library

      - name: Cache renv                        # cache renv library for speed
        uses: actions/cache@v3
        with:
          path: ${{ env.RENV_PATHS_LIBRARY }}
          key: ${{ runner.os }}-renv-v2-${{ hashFiles('Rpkg/renv.lock') }}

      - name: Cache Windows R library           # cache compiled DLLs for fast restore
        if: runner.os == 'Windows'
        uses: actions/cache@v3
        with:
          path: C:/Users/runneradmin/AppData/Local/R/win-library/${{ matrix.config.r }}
          key: windows-rlib-v1-${{ hashFiles('Rpkg/renv.lock') }}

      - name: Restore renv                      # restore project environment
        working-directory: Rpkg
        run: Rscript -e "renv::restore()"

      - name: Install rcmdcheck
        working-directory: Rpkg               # install check tool outside renv
        run: Rscript -e "install.packages('rcmdcheck')"

      - name: Run check (Windows)                       # run r cmd check
        if: runner.os == 'Windows'
        working-directory: Rpkg
        shell: cmd
        run: R CMD check --no-manual --no-vignettes --ignore-vignettes --no-tests --no-examples .
